toolwindow.status.warning.body.intro=To avoid completely blocking the internet on your device, you must follow this order:<br/>1. Click "Disable Proxy" in the application.<br/>2. Wait for confirmation that the settings have been restored.<br/>3. Disconnect the USB cable or terminate ADB.
toolwindow.status.warning.body.question=What happens if I disconnect the cable first?
toolwindow.status.warning.body.answer=Since the proxy is configured directly in the system's global settings via ADB, Android will continue redirecting all traffic to a non-existent port. The internet will not return to normal on its own, and you will not be able to resolve this through common Wi-Fi settings.
toolwindow.status.warning.body.tip=Tip: If you have already disconnected and are without internet, reconnect the device and use the "Reset/Clear" button in the app or run the cleanup command via terminal.
